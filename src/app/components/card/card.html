<div class="grid investments">
  @for (fund of founds(); track $index) {
    <div class="col-12 md:col-12 lg:col-6">
      <div class="card">
        <div class="flex justify-content-between align-items-center">
          <h3 class="title">{{ fund.name }}</h3>
          <span class="bg-orange-100 px-2 font-medium text-sm border-round">{{ fund.type }}</span>
        </div>

        <p class="description">
          {{ fund.description }}
        </p>

        <div class="amount-box">
          <div class="flex justify-content-between">
            <small>{{ texts.card.minAmount }}</small>
            <div class="amount">
              {{ fund.minimumAmount | currency: 'COP ' : 'symbol' : '1.0-0' }}
            </div>
          </div>

          <input
            pInputText
            type="text"
            onlyNumbers
            [placeholder]="texts.card.placeholder"
            class="w-full input"
            maxlength="8"
            [(ngModel)]="fund.amount"
          />

          <div class="mt-3 pt-3 border-top-1 border-gray-100">
             <small class="block mb-2 font-medium text-600">{{ texts.card.notification }}</small>
             <div class="flex align-items-center gap-3">
                 <div class="flex align-items-center">
                     <input type="radio" id="email-{{ fund.id }}" name="notification-{{ fund.id }}" value="email" [(ngModel)]="fund.notificationMethod">
                     <label for="email-{{ fund.id }}" class="ml-2 text-sm text-700 cursor-pointer">{{ texts.card.email }}</label>
                 </div>
                 <div class="flex align-items-center">
                     <input type="radio" id="sms-{{ fund.id }}" name="notification-{{ fund.id }}" value="sms" [(ngModel)]="fund.notificationMethod">
                     <label for="sms-{{ fund.id }}" class="ml-2 text-sm text-700 cursor-pointer">{{ texts.card.sms }}</label>
                 </div>
             </div>
          </div>
        </div>

        <button class="subscribe-btn" (click)="subscribeFound(fund)">
          {{ texts.card.subscribe }} <span class="arrow">→</span>
        </button>
      </div>
    </div>
  }
</div>
<p-toast></p-toast>
