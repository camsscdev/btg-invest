<aside class="sidebar glass-panel h-full" style="border-radius: 16px;">
  <div class="sidebar-section">
    <h4 class="text-xs font-bold text-500 mb-3 flex align-items-center gap-2">
      <i class="pi pi-filter"></i> {{ texts.sidebar.typeTitle }}
    </h4>
    <div class="field-checkbox hover-bg transition-colors p-2 border-round cursor-pointer mb-2">
      <input type="checkbox" id="fic" class="cursor-pointer" (change)="toggleType('FIC', $event.target)" />
      <label for="fic" class="cursor-pointer font-medium text-700 ml-2">{{ texts.sidebar.ficDesc }}</label>
    </div>
    <div class="field-checkbox hover-bg transition-colors p-2 border-round cursor-pointer">
      <input type="checkbox" id="fpv" class="cursor-pointer" (change)="toggleType('FPV', $event.target)" />
      <label for="fpv" class="cursor-pointer font-medium text-700 ml-2">{{ texts.sidebar.fpvDesc }}</label>
    </div>
  </div>
</aside>
