<div
  class="flex flex-column md:flex-row md:align-items-center md:justify-content-between p-4 border-round glass-panel shadow-2 gap-3 mb-4"
>
  <div class="max-w-30rem">
    <h1 class="m-0 mb-2 text-2xl font-bold" style="color: #0f172a;">{{ titleFounds() }}</h1>
    <p class="m-0 text-sm" style="color: #475569; line-height: 1.5;">
      {{ texts.founds.subtitle }}
    </p>
  </div>

  <div class="p-3 border-round md:text-right min-w-12rem" style="background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(14, 165, 233, 0.1)); border: 1px solid rgba(14, 165, 233, 0.2);">
    <span class="block text-xs font-semibold mb-1" style="color: #0284c7; letter-spacing: 0.5px;">{{ texts.founds.balance }}</span>
    <span class="text-2xl font-bold" style="color: #0f172a;">
      {{ user()?.balance | currency: 'COP ' : 'symbol' : '1.0-0' }}
    </span>
  </div>
</div>

<app-card [founds]="founds()" [balance]="user()?.balance || 0" (onBalanceUpdate)="getUser()" />
